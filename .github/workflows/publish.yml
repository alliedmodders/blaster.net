name: Publish

on:
  push:

permissions:
  contents: read
  packages: write

jobs:
  publish-docker-images:
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: blaster-cli
            dockerfile: ./Dockerfile.blaster-cli
          - component: amstats
            dockerfile: ./Dockerfile.amstats

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Normalize image name
        id: vars
        shell: bash
        run: |
          echo "image_name=ghcr.io/${GITHUB_REPOSITORY,,}/${{ matrix.component }}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.vars.outputs.image_name }}
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build and push container image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,scope=${{ matrix.component }},mode=max

  publish-executables:
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: blaster-cli
            project: ./src/Blaster.CLI/Blaster.CLI.csproj
            publish_base: ./src/Blaster.CLI/bin/Release/net10.0
            runtime: linux-x64
          - component: blaster-cli
            project: ./src/Blaster.CLI/Blaster.CLI.csproj
            publish_base: ./src/Blaster.CLI/bin/Release/net10.0
            runtime: win-x64
          - component: blaster-cli
            project: ./src/Blaster.CLI/Blaster.CLI.csproj
            publish_base: ./src/Blaster.CLI/bin/Release/net10.0
            runtime: osx-arm64
          - component: amstats
            project: ./src/Blaster.AmStats/Blaster.AmStats.csproj
            publish_base: ./src/Blaster.AmStats/bin/Release/net10.0
            runtime: linux-x64
          - component: amstats
            project: ./src/Blaster.AmStats/Blaster.AmStats.csproj
            publish_base: ./src/Blaster.AmStats/bin/Release/net10.0
            runtime: win-x64
          - component: amstats
            project: ./src/Blaster.AmStats/Blaster.AmStats.csproj
            publish_base: ./src/Blaster.AmStats/bin/Release/net10.0
            runtime: osx-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Publish executable
        shell: bash
        run: |
          dotnet publish "${{ matrix.project }}" \
            -c Release \
            -r "${{ matrix.runtime }}" \
            --self-contained \
            -p:PublishSingleFile=true \
            -p:PublishReadyToRun=true \
            -p:DebugType=none \
            -p:DebugSymbols=false

      - name: Upload published artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.component }}-${{ matrix.runtime }}
          path: ${{ matrix.publish_base }}/${{ matrix.runtime }}/publish
